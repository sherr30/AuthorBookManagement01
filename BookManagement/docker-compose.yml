version: '3.8'

services:

  postgres:
    image: postgres:18
    container_name: bookmanagement-db
    environment:
      POSTGRES_DB: BookManagement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - bookmanagement-network

  app:
    image: authorbookmanagement:latest
    container_name: bookmanagement-app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DB_URL: "jdbc:postgresql://postgres:5432/BookManagement"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
    networks:
      - bookmanagement-network

networks:
  bookmanagement-network:
    driver: bridge